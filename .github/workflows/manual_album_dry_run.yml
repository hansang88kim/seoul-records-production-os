name: Manual Album Dry Run

on:
  workflow_dispatch:
    inputs:
      track_count:
        description: "Number of tracks to generate"
        required: true
        default: "3"
        type: choice
        options: ["1", "3", "5", "10", "15", "20"]
      preset:
        description: "Language pack"
        required: true
        default: "ko_kr_seoul"
        type: choice
        options: ["ko_kr_seoul"]
      theme:
        description: "Theme"
        required: false
        default: "Late Night Drive"

jobs:
  dry-run:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Run mock album dry run
        env:
          COMPOSER_PROVIDER: mock
          AUTO_MODE_TEST_INTERVAL_SECONDS: "2"
        run: |
          python -c "
import sys
from pathlib import Path
sys.path.insert(0, '.')
from app.project_manager import create_project
from workflows.generate_album import run_song_generation, update_song_list_csv
from agents.producer_agent import generate_song_prompt
from app.state_machine import TrackStatus

track_count = int('${{ github.event.inputs.track_count }}')
language_pack = '${{ github.event.inputs.preset }}'
theme = '${{ github.event.inputs.theme }}'

print(f'Creating project: {track_count} tracks | {language_pack} | {theme}')
manifest, output_folder = create_project(
    project_name=f'DryRun-{track_count}t',
    theme=theme,
    track_count=track_count,
    production_mode='Auto',
    output_type='YouTube + Distribution Package',
    language_pack=language_pack,
)
print(f'Output folder: {output_folder}')

for track in manifest.tracks:
    result = generate_song_prompt(track.track_number, theme, language_pack)
    track.prompt.title = result['title']
    track.prompt.style = result['style']
    track.prompt.lyrics = result['lyrics']
    track.prompt.exclude_styles = result['exclude_styles']
    track.prompt.vocal_gender = 'Female'
    updated = run_song_generation(manifest, output_folder, track, provider_name='mock')
    status = '✅' if updated.status == TrackStatus.SAVED else '❌'
    print(f'{status} Track {updated.track_number}: {updated.prompt.title} | {updated.duration_seconds:.0f}s | WAV={updated.is_wav}')

update_song_list_csv(manifest, output_folder)
print(f'\\nSong list CSV saved.')
print(f'Manifest status: {manifest.status}')
"

      - name: Show output structure
        run: find outputs/ -type f | head -40
