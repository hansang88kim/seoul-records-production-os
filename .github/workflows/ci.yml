name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    env:
      PYTHONDONTWRITEBYTECODE: "1"

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov

      - name: Run tests
        run: |
          PYTHONDONTWRITEBYTECODE=1 python -m pytest tests/ -v -p no:cacheprovider --cov=. --cov-report=term-missing

      - name: Validate presets JSON
        run: |
          python scripts/ci_validate_presets.py

      - name: Check package cleanliness
        run: |
          python scripts/ci_check_cleanliness.py
